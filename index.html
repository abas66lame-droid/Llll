    margin-bottom: 14px;

  h2 { font-size: 16px; margin: 0 0 10px; }

    border: 1px solid #333;
    background: #12141a;
    color: #eee;
    font-size: 13px;

  button {
    background: #ff6f00;
    color: white;
    border: none;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    margin: 3px;

  button.secondary { background: #2b3140; }
  button.active-shift { background: #3ecf6b; color: #06210f; }
  button:hover { opacity: 0.9; }

  th, td { padding: 6px 4px; text-align: center; border-bottom: 1px solid #2a2e37; white-space: nowrap; }
  th { color: #9fd3ff; font-size: 11px; position: sticky; top: 0; background: #1a1d24; }
  td.code-cell { font-weight: bold; color: #ff8a3d; text-align: right; }
  .table-wrap { overflow-x: auto; }
  .check {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 2px solid #666;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 13px;
  }
  .check.on { background: #3ecf6b; border-color: #3ecf6b; color: #06210f; }
  .notes-input { width: 110px; font-size: 11px; padding: 5px; }
  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
  }
  .badge.good { background: #17402a; color: #3ecf6b; }
  .badge.mid { background: #4a3a10; color: #ffcf5c; }
  .badge.bad { background: #4a2020; color: #ff7b7b; }
  .tabs { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab { padding: 7px 12px; background: #1a1d24; border-radius: 8px; cursor: pointer; font-size: 12px; }
  .tab.active { background: #ff6f00; }
  .status { text-align: center; padding: 30px 0; color: #999; }

  .dept-card:hover { background: #22262f; }
  #errorBox { color: #ff7b7b; font-size: 13px; margin-top: 6px; }
  .hidden { display: none !important; }
  .insight { background: #241c0f; border-right: 4px solid #ffb84d; padding: 10px 12px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; }

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysAgoStr(n){ const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
function addDaysStr(dateStr, n){ const d=new Date(dateStr); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }

// اختيار عشوائي ثابت 10% يتغير كل يوم حسب التاريخ (نفس اليوم = نفس العينة لكل من يفتح التطبيق)
function isInDailySample(itemId, date){
  const str = date + '_' + itemId;
  let hash = 0;
  for (let i = 0; i < str.length; i++){ hash = (hash * 31 + str.charCodeAt(i)) % 1000; }
  return (hash % 10) === 0;
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = "";
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error){
    errorBox.textContent = "❌ خطأ: تأكد من الإيميل وكلمة السر";
  } else {
    await handleLoggedIn();
  }
}

async function doLogout(){
  await supabaseClient.auth.signOut();
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('appScreen').classList.add('hidden');
}

window.addEventListener('DOMContentLoaded', async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session){ await handleLoggedIn(); }
});

async function getMyProfile(){
  const { data: { user } } = await supabaseClient.auth.getUser();
  const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
  return profile;
}

async function handleLoggedIn(){
  const loginScreen = document.getElementById('loginScreen');
  const loadingScreen = document.getElementById('loadingScreen');
  const appScreen = document.getElementById('appScreen');

  loginScreen.classList.add('hidden');
  loadingScreen.classList.remove('hidden');

  const profile = await getMyProfile();
  if (!profile){
    const { data: { user } } = await supabaseClient.auth.getUser();
    loadingScreen.innerHTML = `⚠️ هذا الحساب ما له دور محدد بعد.<br>UID: <code style="color:#ff8a3d">${user.id}</code>`;
    return;
  }

  loadingScreen.classList.add('hidden');
  appScreen.classList.remove('hidden');

  document.getElementById('userNameLabel').textContent = profile.name || '';
  const roleLabels = { shift: "مسؤول شفت", hall: "مسؤول صالة", sales: "مسؤول مبيعات" };
  const shiftLabels = { morning: "صباحي", evening: "مسائي", both: "صباحي ومسائي" };
  document.getElementById('userRoleLabel').textContent = roleLabels[profile.role] || profile.role;

  document.getElementById('shiftView').classList.add('hidden');
  document.getElementById('hallView').classList.add('hidden');
  document.getElementById('salesView').classList.add('hidden');

  if (profile.role === 'shift'){
    document.getElementById('shiftView').classList.remove('hidden');
    currentShiftChoice = 'morning';
    currentDate = todayStr();
    currentManageMode = false;
    await renderShiftView(profile);
  } else if (profile.role === 'hall'){
    document.getElementById('hallView').classList.remove('hidden');
    currentManageMode = false;
    await renderHallView(profile);
  } else if (profile.role === 'sales'){
    document.getElementById('salesView').classList.remove('hidden');
    await renderSalesView();
  }
}

async function getDailyLogsMap(locationIds, date, shift){

async function toggleIpadField(ipadId, fieldKey, date, shift){
  const box = document.getElementById(`ipadchk_${ipadId}_${fieldKey}`);
  const willBeOn = box && !box.classList.contains('on');
  if (box){ box.classList.toggle('on'); box.textContent = willBeOn ? '✓' : ''; }
  const { data: { user } } = await supabaseClient.auth.getUser();
  const existing = await getIpadLog(ipadId, date, shift);
  const payload = {
    ipad_id: ipadId, log_date: date, shift: shift,
    inventory: existing?.inventory || false,
    has_case: existing?.has_case || false,
    has_screen_protector: existing?.has_screen_protector || false,
    updated_by: user.id, updated_at: new Date().toISOString()
  };
  payload[fieldKey] = !payload[fieldKey];
  const { error } = await supabaseClient.from('ipad_logs').upsert(payload, { onConflict: 'ipad_id,log_date,shift' });
  if (error){ alert('خطأ بالحفظ: ' + error.message); }

async function renderIpadSection(deptId){

  const date = currentDate || todayStr();

  const logsMap = await getIpadLogsMap(ipadIds, date, shift);

  let rowsHtml = "";
  for (const ip of ipads){
    const log = logsMap[ip.id];
    let cells = "";
    for (const f of IPAD_FIELD_DEFS){
      const checked = log ? log[f.key] : false;
      cells += `<td><div class="check ${checked?'on':''}" id="ipadchk_${ip.id}_${f.key}" onclick="toggleIpadField('${ip.id}','${f.key}','${date}','${shift}')">${checked?'✓':''}</div></td>`;

    const delBtn = canManage ? ` <span style="cursor:pointer;color:#ff7b7b;font-size:11px;" onclick="confirmDeleteClick(this, () => deleteIpad('${ip.id}','${deptId}'))">✕</span>` : '';
    rowsHtml += `<tr><td class="code-cell">${ip.code}${delBtn}</td>${cells}</tr>`;
  }

  const manageHtml = canManage ? `
    <div style="margin-top:10px;">
      <input type="text" id="newIpadInput" placeholder="كود الآيباد الجديد">

// تأكيد حذف آمن بضغطتين (بدون confirm() اللي ما تشتغل صح ببعض العارضات)
function confirmDeleteClick(btnEl, deleteFn){
  if (btnEl.dataset.confirming === '1'){
    deleteFn();
    return;
  }
  btnEl.dataset.confirming = '1';
  const original = btnEl.textContent;
  btnEl.textContent = '✅ اضغط للتأكيد';
  btnEl.style.color = '#ffcf5c';
  setTimeout(() => {
    if (btnEl.dataset.confirming === '1'){
      btnEl.dataset.confirming = '0';
      btnEl.textContent = original;
      btnEl.style.color = '#ff7b7b';
    }
  }, 3000);
}

async function updatePointField(staffId, deptId, date, fieldKey, value){
  let v = parseInt(value, 10);
  if (isNaN(v)) v = 0;
  if (v < 0) v = 0;
  if (v > 10) v = 10;
  const { data: { user } } = await supabaseClient.auth.getUser();
  const existing = await getStaffPoints(staffId, date);
  const payload = { staff_id: staffId, log_date: date, updated_by: user.id, updated_at: new Date().toISOString() };
  POINT_FIELD_DEFS.forEach(f => { payload[f.key] = existing ? existing[f.key] : null; });
  payload[fieldKey] = v;
  const { error } = await supabaseClient.from('staff_points').upsert(payload, { onConflict: 'staff_id,log_date' });
  if (error){ alert('خطأ: ' + error.message); return; }
  await renderPointsSection(deptId);

function openPointSlider(staffId, deptId, date, fieldKey, fieldLabel, currentVal){
  const start = currentVal === null ? 5 : currentVal;
  const ov = document.createElement('div');
  ov.id = 'psOverlay';
  ov.style.cssText = 'position:fixed;inset:0;background:#0f1115;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;';
  ov.innerHTML = `
    <div style="color:#9fd3ff;font-size:16px;margin-bottom:10px;">${fieldLabel}</div>
    <div id="psVal" style="font-size:64px;font-weight:bold;color:#ff8a3d;margin-bottom:20px;">${start}</div>
    <input id="psRange" type="range" min="0" max="10" value="${start}" style="width:90%;height:50px;">
    <div style="display:flex;gap:10px;margin-top:30px;">
      <button id="psCancel" class="secondary">إلغاء</button>
      <button id="psSave">✅ حفظ</button>
    </div>`;
  document.body.appendChild(ov);
  const range = ov.querySelector('#psRange');
  const valEl = ov.querySelector('#psVal');
  range.oninput = () => { valEl.textContent = range.value; };
  ov.querySelector('#psCancel').onclick = () => ov.remove();
  ov.querySelector('#psSave').onclick = async () => {
    await updatePointField(staffId, deptId, date, fieldKey, range.value);
    ov.remove();
  };
}

async function toggleHistoryPanel(deptId){
  const panel = document.getElementById('historyPanel');
  if (panel.dataset.open === '1'){
    panel.innerHTML = '';
    panel.dataset.open = '0';
    return;
  }
  panel.innerHTML = '<div class="status">جاري تحميل السجل...</div>';
  panel.dataset.open = '1';

  const locations = await getLocations(deptId);
  const locationIds = locations.map(l => l.id);
  const startDate = daysAgoStr(29);
  const endDate = todayStr();
  const { data: logs } = await supabaseClient.from('daily_logs').select('*')
    .in('location_id', locationIds).gte('log_date', startDate).lte('log_date', endDate);

  const byDate = {};
  (logs || []).forEach(l => {
    if (!byDate[l.log_date]) byDate[l.log_date] = [];
    byDate[l.log_date].push(l);
  });

  let rows = "";
  for (let i = 0; i <= 29; i++){
    const d = daysAgoStr(i);
    const dayLogs = byDate[d] || [];
    const totalPossible = locations.length * 2 * FIELD_DEFS.length; // شفتين
    let checked = 0;
    dayLogs.forEach(l => FIELD_DEFS.forEach(f => { if (l[f.key]) checked++; }));
    const pct = totalPossible ? Math.round((checked/totalPossible)*100) : 0;
    rows += `<tr style="cursor:pointer;" onclick="goToDate('${d}')"><td>${d}</td><td>${pct}%</td></tr>`;
  }

  panel.innerHTML = `
    <div class="card" style="max-height:300px; overflow-y:auto;">
      <h3>آخر 30 يوم (اضغط على تاريخ للانتقال له)</h3>
      <table><tr><th>التاريخ</th><th>نسبة الإنجاز</th></tr>${rows}</table>
    </div>`;
}

function auditRow(table, idField, id, fieldKey, label, shiftDone, hallVerified){
  return `
    <div class="item-row ${shiftDone?'checked':'unchecked'}">
      <div class="item-name">${label} ${shiftDone ? '(أنجزها مسؤول الشفت)' : '(لسا ما تسوّت)'}</div>
      <div class="check ${hallVerified?'on':''}" onclick="toggleHallVerify('${table}','${idField}','${id}','${fieldKey}', this)">${hallVerified?'✓':''}</div>
    </div>`;
}

async function toggleHallVerify(table, idField, id, fieldKey, box){
  const date = todayStr();
  const willBeOn = !box.classList.contains('on');
  box.classList.toggle('on');
  box.textContent = willBeOn ? '✓' : '';

  const { data: existing } = await supabaseClient.from(table).select('*').eq(idField, id).eq('log_date', date).maybeSingle();
  const payload = { [idField]: id, log_date: date, shift: 'morning' };
  // نحافظ على كل القيم الموجودة ونضيف فقط hall_verified
  if (existing){
    Object.keys(existing).forEach(k => { if (k !== 'id') payload[k] = existing[k]; });
  }
  payload.hall_verified = willBeOn;
  const { error } = await supabaseClient.from(table).upsert(payload, { onConflict: `${idField},log_date` });
  if (error){ alert('خطأ: ' + error.message); }
}

// يحسب نسبة الإنجاز العامة لكل الأقسام دفعة وحدة باستعلامات مجمّعة (سريع)
async function computeAllDeptsOverallPct(date){
  const totals = {}; // deptId -> { total, done }
  const bump = (deptId, total, done) => {
    if (!totals[deptId]) totals[deptId] = { total: 0, done: 0 };
    totals[deptId].total += total;
    totals[deptId].done += done;
  };

  // المواقع
  const { data: allLocations } = await supabaseClient.from('locations').select('id, department_id');
  const locToDept = {}; (allLocations||[]).forEach(l => locToDept[l.id]=l.department_id);
  const { data: locLogs } = await supabaseClient.from('daily_logs').select('*').eq('log_date', date);
  (allLocations||[]).forEach(loc => bump(loc.department_id, FIELD_DEFS.length * 2, 0)); // 2 = شفتين، القيمة الافتراضية صفر منجز
  (locLogs||[]).forEach(l => {
    const deptId = locToDept[l.location_id];
    if (!deptId) return;
    FIELD_DEFS.forEach(f => { if (l[f.key]) bump(deptId, 0, 1); });
  });

  // الموظفين
  const { data: allStaff } = await supabaseClient.from('staff').select('id, department_id');
  const staffToDept = {}; (allStaff||[]).forEach(s => staffToDept[s.id]=s.department_id);
  const { data: staffLogs } = await supabaseClient.from('staff_evaluations').select('*').eq('log_date', date);
  (allStaff||[]).forEach(s => bump(s.department_id, STAFF_FIELD_DEFS.length * 2, 0));
  (staffLogs||[]).forEach(e => {
    const deptId = staffToDept[e.staff_id];
    if (!deptId) return;
    STAFF_FIELD_DEFS.forEach(f => { if (e[f.key]) bump(deptId, 0, 1); });
  });

  // المهام اليومية
  const { data: allTasks } = await supabaseClient.from('daily_tasks').select('id, department_id');
  const taskToDept = {}; (allTasks||[]).forEach(t => taskToDept[t.id]=t.department_id);
  const { data: taskLogs } = await supabaseClient.from('daily_task_logs').select('*').eq('log_date', date);
  (allTasks||[]).forEach(t => bump(t.department_id, 1 * 2, 0));
  (taskLogs||[]).forEach(l => {
    const deptId = taskToDept[l.task_id];
    if (!deptId) return;
    if (l.checked) bump(deptId, 0, 1);
  });

  // الآيباد
  const { data: allIpads } = await supabaseClient.from('ipads').select('id, department_id');
  const ipadToDept = {}; (allIpads||[]).forEach(i => ipadToDept[i.id]=i.department_id);
  const { data: ipadLogs } = await supabaseClient.from('ipad_logs').select('*').eq('log_date', date);
  (allIpads||[]).forEach(i => bump(i.department_id, IPAD_FIELD_DEFS.length * 2, 0));
  (ipadLogs||[]).forEach(l => {
    const deptId = ipadToDept[l.ipad_id];
    if (!deptId) return;
    IPAD_FIELD_DEFS.forEach(f => { if (l[f.key]) bump(deptId, 0, 1); });
  });

  // قارئ السيريال
  const { data: allReaders } = await supabaseClient.from('serial_readers').select('id, department_id');
  const readerToDept = {}; (allReaders||[]).forEach(r => readerToDept[r.id]=r.department_id);
  const { data: readerLogs } = await supabaseClient.from('serial_reader_logs').select('*').eq('log_date', date);
  (allReaders||[]).forEach(r => bump(r.department_id, READER_FIELD_DEFS.length * 2, 0));
  (readerLogs||[]).forEach(l => {
    const deptId = readerToDept[l.reader_id];
    if (!deptId) return;
    READER_FIELD_DEFS.forEach(f => { if (l[f.key]) bump(deptId, 0, 1); });
  });

  // نظافة القسم
  const { data: depts2 } = await supabaseClient.from('departments').select('id');
  const { data: cleanLogs } = await supabaseClient.from('department_cleanliness_logs').select('*').eq('log_date', date);
  (depts2||[]).forEach(d => bump(d.id, CLEAN_FIELD_DEFS.length * 2, 0));
  (cleanLogs||[]).forEach(l => {
    CLEAN_FIELD_DEFS.forEach(f => { if (l[f.key]) bump(l.department_id, 0, 1); });
  });

  const pctByDept = {};
  Object.entries(totals).forEach(([deptId, t]) => {
    pctByDept[deptId] = t.total ? Math.round((t.done / t.total) * 100) : 0;
  });
  return pctByDept;
}

// متوسط نقاط الموظفين لكل قسم على مدى فترة (كنسبة مئوية من أصل 60 نقطة لكل تقييم)
async function computeAvgStaffPointsByDept(startDate, endDate){
  const { data: allStaff } = await supabaseClient.from('staff').select('id, department_id');
  const staffToDept = {}; (allStaff||[]).forEach(s => staffToDept[s.id]=s.department_id);
  const { data: pointsLogs } = await supabaseClient.from('staff_points').select('*')
    .gte('log_date', startDate).lte('log_date', endDate);

  const sums = {}; // deptId -> { total, count }
  (pointsLogs||[]).forEach(p => {
    const deptId = staffToDept[p.staff_id];
    if (!deptId) return;
    let sum = 0, filled = 0;
    POINT_FIELD_DEFS.forEach(f => { if (typeof p[f.key] === 'number'){ sum += p[f.key]; filled++; } });
    if (filled === 0) return;
    if (!sums[deptId]) sums[deptId] = { total: 0, count: 0 };
    sums[deptId].total += (sum / (filled * 10)) * 100;
    sums[deptId].count += 1;
  });

  const avgByDept = {};
  Object.entries(sums).forEach(([deptId, s]) => {
    avgByDept[deptId] = s.count ? Math.round(s.total / s.count) : null;
  });
  return avgByDept;
}

function periodRange(period, refDate){
  const end = refDate || todayStr();
  if (period === 'daily') return { startDate: end, endDate: end, label: 'يومي' };
  if (period === 'weekly') return { startDate: addDaysStr(end, -6), endDate: end, label: 'أسبوعي' };
  return { startDate: addDaysStr(end, -29), endDate: end, label: 'شهري' };
}

async function runAIAnalysis(period){
  const box = document.getElementById('aiAnalysisBox');
  if (!box) return;
  box.textContent = '⏳ جاري تجهيز البيانات وتحليلها بالذكاء الاصطناعي...';
  try {
    const { startDate, endDate, label } = periodRange(period, salesSelectedDate);
    const { data: depts } = await supabaseClient.from('departments').select('*').order('id');

    const [pctByDept, avgPointsByDept] = await Promise.all([
      computeAllDeptsOverallPctRange(startDate, endDate),
      computeAvgStaffPointsByDept(startDate, endDate)
    ]);

    const departments = (depts || []).map(d => ({
      name: d.name,
      completion_pct: pctByDept[d.id] ?? 0,
      staff_points_pct: avgPointsByDept[d.id] ?? null
    }));

    const { data, error } = await supabaseClient.functions.invoke('ai-analysis', {
      body: { period, label, startDate, endDate, departments }
    });

    if (error) throw error;
    box.textContent = data?.analysis || 'لم يتم استلام رد من التحليل.';
  } catch (err) {
    box.innerHTML = `<span style="color:#ff7b7b;">❌ خطأ بالتحليل: ${err.message || JSON.stringify(err)}</span>`;
  }
}

function changeSalesDate(deltaDays){
  salesSelectedDate = addDaysStr(salesSelectedDate || todayStr(), deltaDays);
  refreshSalesDateUI();
}

function setSalesDate(dateStr){
  salesSelectedDate = dateStr;
  refreshSalesDateUI();
}

function refreshSalesDateUI(){
  const dateInput = document.querySelector('#salesView input[type=date]');
  if (dateInput) dateInput.value = salesSelectedDate;
  loadSalesRange(currentSalesRange);
  loadStaffRange(currentStaffRange);
  loadTaskRange(currentTaskRange);
  loadIpadRange('day');
  loadReaderRange('day');
  loadCleanRange('day');
}

async function loadStaffRange(range){
  currentStaffRange = range;
  ['staffTabDay','staffTabWeek','staffTabMonth'].forEach(id => document.getElementById(id).classList.remove('active'));
  const tabId = range === 'day' ? 'staffTabDay' : range === 'week' ? 'staffTabWeek' : 'staffTabMonth';
  document.getElementById(tabId).classList.add('active');

  const wrap = document.getElementById('staffTableWrap');
  const insightsWrap = document.getElementById('staffInsightsWrap');
  wrap.innerHTML = "جاري التحميل...";

  const daysBack = range === 'day' ? 0 : range === 'week' ? 6 : 29;
  const endDate = salesSelectedDate || todayStr();
  const startDate = addDaysStr(endDate, -daysBack);
  const numDays = daysBack + 1;

  const { data: allStaffRaw, error: staffError } = await supabaseClient.from('staff').select('*, departments(name)');
  if (staffError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ بجلب الموظفين: ${staffError.message}</div>`;
    return;
  }
  const allStaff = currentSalesDeptId ? (allStaffRaw||[]).filter(s => s.department_id === currentSalesDeptId) : allStaffRaw;
  if (!allStaff || allStaff.length === 0){
    wrap.innerHTML = `<div style="color:#ffcf5c;">لا يوجد موظفون مسجلون بعد.</div>`;
    insightsWrap.innerHTML = '';
    return;
  }

  const { data: evals, error: evalError } = await supabaseClient.from('staff_evaluations').select('*')
    .gte('log_date', startDate).lte('log_date', endDate);
  if (evalError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ بجلب التقييمات: ${evalError.message}</div>`;
    return;
  }

  const evalsByStaff = {};
  (evals || []).forEach(e => {
    if (!evalsByStaff[e.staff_id]) evalsByStaff[e.staff_id] = [];
    evalsByStaff[e.staff_id].push(e);
  });

  const criterionNeglect = {}; STAFF_FIELD_DEFS.forEach(f => criterionNeglect[f.key] = 0);
  let worstStaffName = null, worstStaffPct = 101, worstStaffDept = '';

  let rowsHtml = "";
  for (const s of allStaff){
    const staffEvals = evalsByStaff[s.id] || [];
    const totalPossible = numDays * STAFF_FIELD_DEFS.length;
    let checked = 0;
    staffEvals.forEach(e => {
      STAFF_FIELD_DEFS.forEach(f => {
        if (e[f.key]) checked++;
        else criterionNeglect[f.key]++;
      });
    });
    const pct = totalPossible ? Math.round((checked/totalPossible)*100) : 0;
    const negatives = totalPossible - checked;
    if (pct < worstStaffPct){ worstStaffPct = pct; worstStaffName = s.name; worstStaffDept = s.departments?.name || ''; }
    const badgeClass = pct>=80?'good':pct>=50?'mid':'bad';
    rowsHtml += `<tr>
      <td>${s.name}</td>
      <td>${s.departments?.name || ''}</td>
      <td>${checked}/${totalPossible}</td>
      <td><span class="badge ${badgeClass}">${pct}%</span></td>
      <td style="color:${negatives>0?'#ff7b7b':'#3ecf6b'}">${negatives}</td>
    </tr>`;
  }

  let worstCriterion = null, worstCriterionCount = -1;
  Object.entries(criterionNeglect).forEach(([k,v]) => { if (v > worstCriterionCount){ worstCriterionCount = v; worstCriterion = k; } });
  const worstCriterionLabel = STAFF_FIELD_DEFS.find(f=>f.key===worstCriterion)?.label || worstCriterion;

  insightsWrap.innerHTML = worstStaffName ? `
    <div class="insight">📌 أضعف موظف بالفترة: <b>${worstStaffName}</b> (${worstStaffDept}) — ${worstStaffPct}% إنجاز</div>
    <div class="insight">📌 أكثر معيار مهمل: <b>${worstCriterionLabel}</b> (${worstCriterionCount} مرة غير منجز)</div>
  ` : '';

  wrap.innerHTML = `
    <div class="table-wrap">
    <table>
      <tr><th>الموظف</th><th>القسم</th><th>منجز/المتوقع</th><th>نسبة الإنجاز</th><th>سلبيات</th></tr>
      ${rowsHtml}
    </table>
    </div>`;
}

async function loadSalesRange(range){
  currentSalesRange = range;
  ['tabDay','tabWeek','tabMonth'].forEach(id => document.getElementById(id).classList.remove('active'));
  const tabId = range === 'day' ? 'tabDay' : range === 'week' ? 'tabWeek' : 'tabMonth';
  document.getElementById(tabId).classList.add('active');

  const wrap = document.getElementById('salesTableWrap');
  const insightsWrap = document.getElementById('insightsWrap');
  wrap.innerHTML = "جاري التحميل...";

  const daysBack = range === 'day' ? 0 : range === 'week' ? 6 : 29;
  const endDate = salesSelectedDate || todayStr();
  const startDate = addDaysStr(endDate, -daysBack);

  let { data: depts, error: deptsError } = await supabaseClient.from('departments').select('*').order('id');
  if (deptsError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ بجلب الأقسام: ${deptsError.message}</div>`;
    return;
  }
  if (currentSalesDeptId) depts = (depts||[]).filter(d => d.id === currentSalesDeptId);
  const { data: allLocations, error: locsError } = await supabaseClient.from('locations').select('id, department_id');
  if (locsError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ بجلب المواقع: ${locsError.message}</div>`;
    return;
  }
  const locToDept = {};
  (allLocations || []).forEach(l => { locToDept[l.id] = l.department_id; });

  const { data: logs, error: logsError } = await supabaseClient.from('daily_logs').select('*')
    .gte('log_date', startDate).lte('log_date', endDate);

  if (logsError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ بجلب البيانات: ${logsError.message}</div>`;
    return;
  }

  const logsByDept = {};
  (logs || []).forEach(l => {
    const dId = locToDept[l.location_id];
    if (!dId) return;
    if (!logsByDept[dId]) logsByDept[dId] = [];
    logsByDept[dId].push(l);
  });

  if (!depts || depts.length === 0){
    wrap.innerHTML = `<div style="color:#ffcf5c;">لا توجد أقسام مسجلة بقاعدة البيانات (departments فاضية).</div>`;
    return;
  }

  let worstDept = null, worstPct = 101;
  const fieldNeglect = {}; FIELD_DEFS.forEach(f => fieldNeglect[f.key] = 0);

  let rowsHtml = "";
  for (const dept of (depts || [])){
    const locations = await getLocations(dept.id);
    const numDays = daysBack + 1;
    const deptLogs = logsByDept[dept.id] || [];
    let checkedFields = 0;
    let totalFieldsPossible = locations.length * numDays * FIELD_DEFS.length;
    const deptFieldNeglect = {}; FIELD_DEFS.forEach(f => deptFieldNeglect[f.key] = 0);
    deptLogs.forEach(l => {
      FIELD_DEFS.forEach(f => {
        if (l[f.key]) checkedFields++;
        else { fieldNeglect[f.key]++; deptFieldNeglect[f.key]++; }
      });
    });
    const pct = totalFieldsPossible ? Math.round((checkedFields/totalFieldsPossible)*100) : 0;
    const negatives = totalFieldsPossible - checkedFields;
    if (pct < worstPct){ worstPct = pct; worstDept = dept.name; }
    const badgeClass = pct>=80?'good':pct>=50?'mid':'bad';

    let deptWorstField = null, deptWorstCount = -1;
    Object.entries(deptFieldNeglect).forEach(([k,v]) => { if (v > deptWorstCount){ deptWorstCount = v; deptWorstField = k; } });
    const deptWorstLabel = deptWorstCount > 0 ? (FIELD_DEFS.find(f=>f.key===deptWorstField)?.label || deptWorstField) : '—';

    rowsHtml += `<tr>
      <td>${dept.name}</td>
      <td>${locations.length}</td>
      <td>${checkedFields}/${totalFieldsPossible}</td>
      <td><span class="badge ${badgeClass}">${pct}%</span></td>
      <td style="color:${negatives>0?'#ff7b7b':'#3ecf6b'}">${negatives}</td>
      <td>${deptWorstLabel}${deptWorstCount>0?' ('+deptWorstCount+')':''}</td>
    </tr>`;
  }

  let worstField = null, worstFieldCount = -1;
  Object.entries(fieldNeglect).forEach(([k,v]) => { if (v > worstFieldCount){ worstFieldCount = v; worstField = k; } });
  const fieldLabel = FIELD_DEFS.find(f=>f.key===worstField)?.label || worstField;

  insightsWrap.innerHTML = worstDept ? `
    ${currentSalesDeptId ? '' : `<div class="insight">📌 أضعف قسم بالفترة: <b>${worstDept}</b> (${worstPct}% إنجاز)</div>`}
    <div class="insight">📌 أكثر خانة مهملة: <b>${fieldLabel}</b> (${worstFieldCount} مرة غير منجزة)</div>
  ` : '';

  wrap.innerHTML = `
    <div class="table-wrap">
    <table>
      <tr><th>القسم</th><th>عدد المواقع</th><th>منجز/المتوقع</th><th>نسبة الإنجاز</th><th>سلبيات</th><th>أضعف خانة</th></tr>
      ${rowsHtml}
    </table>
    </div>`;
}

async function loadTaskRange(range){
  currentTaskRange = range;
  ['taskTabDay','taskTabWeek','taskTabMonth'].forEach(id => document.getElementById(id).classList.remove('active'));
  const tabId = range === 'day' ? 'taskTabDay' : range === 'week' ? 'taskTabWeek' : 'taskTabMonth';
  document.getElementById(tabId).classList.add('active');

  const wrap = document.getElementById('taskTableWrap');
  const insightsWrap = document.getElementById('taskInsightsWrap');
  wrap.innerHTML = "جاري التحميل...";

  const daysBack = range === 'day' ? 0 : range === 'week' ? 6 : 29;
  const endDate = salesSelectedDate || todayStr();
  const startDate = addDaysStr(endDate, -daysBack);
  const numDays = daysBack + 1;

  let { data: depts, error: deptsError } = await supabaseClient.from('departments').select('*').order('id');
  if (deptsError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ: ${deptsError.message}</div>`;
    return;
  }
  if (currentSalesDeptId) depts = (depts||[]).filter(d => d.id === currentSalesDeptId);
  const { data: allTasks, error: tasksError } = await supabaseClient.from('daily_tasks').select('id, department_id, name');
  if (tasksError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ: ${tasksError.message}</div>`;
    return;
  }
  const { data: logs, error: logsError } = await supabaseClient.from('daily_task_logs').select('*')
    .gte('log_date', startDate).lte('log_date', endDate);
  if (logsError){
    wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ: ${logsError.message}</div>`;
    return;
  }

  const taskToDept = {};
  const tasksByDept = {};
  (allTasks || []).forEach(t => {
    taskToDept[t.id] = t.department_id;
    if (!tasksByDept[t.department_id]) tasksByDept[t.department_id] = [];
    tasksByDept[t.department_id].push(t);
  });

  const logsByTask = {};
  (logs || []).forEach(l => {
    if (!logsByTask[l.task_id]) logsByTask[l.task_id] = [];
    logsByTask[l.task_id].push(l);
  });

  let worstDept = null, worstPct = 101;
  let worstTaskName = null, worstTaskCount = -1, worstTaskDept = '';

  let rowsHtml = "";
  for (const dept of (depts || [])){
    const tasks = tasksByDept[dept.id] || [];
    const totalPossible = tasks.length * numDays;
    let checked = 0;
    tasks.forEach(t => {
      const tLogs = logsByTask[t.id] || [];
      const tChecked = tLogs.filter(l => l.checked).length;
      checked += tChecked;
      const tNeglect = numDays - tChecked;
      if (tNeglect > worstTaskCount){ worstTaskCount = tNeglect; worstTaskName = t.name; worstTaskDept = dept.name; }
    });
    const pct = totalPossible ? Math.round((checked/totalPossible)*100) : 0;
    const negatives = totalPossible - checked;
    if (pct < worstPct){ worstPct = pct; worstDept = dept.name; }
    const badgeClass = pct>=80?'good':pct>=50?'mid':'bad';
    rowsHtml += `<tr>
      <td>${dept.name}</td>
      <td>${tasks.length}</td>
      <td>${checked}/${totalPossible}</td>
      <td><span class="badge ${badgeClass}">${pct}%</span></td>
      <td style="color:${negatives>0?'#ff7b7b':'#3ecf6b'}">${negatives}</td>
    </tr>`;
  }

  insightsWrap.innerHTML = worstDept ? `
    ${currentSalesDeptId ? '' : `<div class="insight">📌 أضعف قسم بالمهام اليومية: <b>${worstDept}</b> (${worstPct}% إنجاز)</div>`}
    <div class="insight">📌 أكثر مهمة مهملة: <b>${worstTaskName}</b> بقسم ${worstTaskDept} (${worstTaskCount} مرة غير منجزة)</div>
  ` : '';

  wrap.innerHTML = `
    <div class="table-wrap">
    <table>
      <tr><th>القسم</th><th>عدد المهام</th><th>منجز/المتوقع</th><th>نسبة الإنجاز</th><th>سلبيات</th></tr>
      ${rowsHtml}
    </table>
    </div>`;
}

async function loadPointsRange(range){
  ['pointsTabDay','pointsTabWeek','pointsTabMonth'].forEach(id => document.getElementById(id).classList.remove('active'));
  const tabId = range === 'day' ? 'pointsTabDay' : range === 'week' ? 'pointsTabWeek' : 'pointsTabMonth';
  document.getElementById(tabId).classList.add('active');

  const wrap = document.getElementById('pointsTableWrap');
  wrap.innerHTML = "جاري التحميل...";

  const daysBack = range === 'day' ? 0 : range === 'week' ? 6 : 29;
  const numDays = daysBack + 1;
  const endDate = salesSelectedDate || todayStr();
  const startDate = addDaysStr(endDate, -daysBack);

  let { data: allStaff, error: staffErr } = await supabaseClient.from('staff').select('*, departments(name)');
  if (staffErr){ wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ: ${staffErr.message}</div>`; return; }
  if (currentSalesDeptId) allStaff = (allStaff||[]).filter(s => s.department_id === currentSalesDeptId);

  const { data: points, error: ptsErr } = await supabaseClient.from('staff_points').select('*')
    .gte('log_date', startDate).lte('log_date', endDate);
  if (ptsErr){ wrap.innerHTML = `<div style="color:#ff7b7b;">خطأ: ${ptsErr.message}</div>`; return; }

  const pointsByStaff = {};
  (points || []).forEach(p => {
    if (!pointsByStaff[p.staff_id]) pointsByStaff[p.staff_id] = [];
    pointsByStaff[p.staff_id].push(p);
  });

  let rowsHtml = "";
  for (const s of (allStaff || [])){
    const staffPoints = pointsByStaff[s.id] || [];
    const totals = {}; POINT_FIELD_DEFS.forEach(f => totals[f.key] = 0);
    staffPoints.forEach(p => { POINT_FIELD_DEFS.forEach(f => { totals[f.key] += (p[f.key] || 0); }); });
    const maxPossible = numDays * 60;
    const grandTotal = Object.values(totals).reduce((a,b) => a+b, 0);
    rowsHtml += `<tr>
      <td>${s.name}</td>
      <td>${s.departments?.name || ''}</td>
      ${POINT_FIELD_DEFS.map(f => `<td>${totals[f.key]}</td>`).join('')}
      <td style="font-weight:bold;">${grandTotal}${maxPossible?'/'+maxPossible:''}</td>
    </tr>`;
  }

  wrap.innerHTML = `
    <div class="table-wrap">

    </table>
    </div>`;
}

// تصدير أي جدول تحليل معروض حالياً إلى ملف Excel
function exportTableToExcel(wrapId, filename, btnEl){
  const originalText = btnEl ? btnEl.textContent : null;
  if (btnEl){ btnEl.textContent = '⏳ جاري التحضير...'; btnEl.disabled = true; }
  setTimeout(async () => {
    try {
      if (typeof XLSX === 'undefined'){
        alert('مكتبة Excel ما تحملت — تأكد من اتصال الإنترنت وحدّث الصفحة');
        return;
      }
      const wrap = document.getElementById(wrapId);
      const table = wrap ? wrap.querySelector('table') : null;
      if (!table){
        alert('لا يوجد جدول لتصديره حالياً — انتظر لين يخلص التحميل وجرب مرة ثانية');
        return;
      }
      const aoa = [];
      table.querySelectorAll('tr').forEach(tr => {
        const row = [];
        tr.querySelectorAll('th,td').forEach(cell => row.push(cell.textContent.trim()));
        aoa.push(row);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'تقرير');
      const wbout = XLSX.write(wb, { type: 'array', bookType: 'xlsx' });
      const bytes = wbout instanceof Uint8Array ? wbout : new Uint8Array(wbout);
      const fname = `${filename}_${todayStr()}.xlsx`;
      const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const file = new File([blob], fname, { type: blob.type });

      if (navigator.canShare && navigator.canShare({ files: [file] })){
        await navigator.share({ files: [file], title: fname });
        return;
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      alert('إذا ما نزل الملف تلقائياً، بيفتح بصفحة جديدة — احفظه منها يدوياً');
      window.open(url, '_blank');
    } catch (err) {
      if (err.name !== 'AbortError') alert('خطأ بالتصدير: ' + (err.message || JSON.stringify(err)));
    } finally {
      if (btnEl){ btnEl.textContent = originalText; btnEl.disabled = false; }
    }
  }, 50);
}
